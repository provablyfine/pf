[project]
name = "pf"
version = "0.1"
requires-python = ">=3.12"
dependencies = [
  "openapi-core",
  "cryptography>=45.0.0",
  "sqlalchemy",
  "databases",
  "http-message-signatures>=2.0.1",
  "fastapi>=0.115",
  "uvicorn>=0.34",
  "dateparser>=1.3.0",
  "tabulate>=0.9.0",
  "requests>=2.32.5",
  "pydantic",
  "textual-autocomplete>=4.0.6",
  "websockets>=13.0",
  "h2>=4.0.0",
  "pyjwt>=2.12.1",
]

[project.scripts]
pf = "pf.cli.pf.main:pf"
pfa = "pf.cli.pfa.main:pfa"

[dependency-groups]
dev = [
    "coverage>=7.13.4",
    "jinja2>=3.1.6",
    "pyright>=1.1.408",
    "pytest>=9.0.2",
    "pytest-xdist>=3.8.0",
    "pytest-anyio",
    "ruff>=0.15.6",
]

[tool.pytest.ini_options]
minversion = "6.0"
addopts = "--tb=short -n auto"
testpaths = [
    "src/pf",
    "tests",
]

[tool.pyright]
include = ["src/pf", "tests"]
exclude = [
"**/node_modules",
"**/__pycache__",
]
typeCheckingMode = "standard"

[tool.ruff]
line-length = 120
[tool.ruff.lint]
select = ["E", "F", "I", "UP", "RUF"]

[tool.mypy]
strict = true
