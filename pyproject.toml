[project]
name = "idb"
version = "0.1"
requires-python = ">=3.12"
dependencies = [
  "openapi-core",
  "cryptography>=45.0.0",
  "sqlalchemy",
  "databases",
  "http-message-signatures>=2.0.1",
  "webob>=1.8.9",
  "dateparser>=1.3.0",
  "tabulate>=0.9.0",
  "requests>=2.32.5",
]

[project.scripts]
idbctl = "idb.cli.__main__:main"

[tool.pytest.ini_options]
minversion = "6.0"
addopts = "--tb=short"
testpaths = [
    "src/idb",
    "tests",
]

[dependency-groups]
dev = [
    "coverage>=7.13.4",
    "gunicorn>=25.1.0",
    "jinja2>=3.1.6",
    "pytest>=9.0.2",
    "pytest-xdist>=3.8.0",
]
