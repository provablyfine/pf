openapi: 3.1.0
info:
  title: IDB API implementation
  description: IDB API to control users and hosts
  version: '1.0'

x-bundles:
  invitation-signature: &InvitationSignature
    - HMACSignature: []
      ED25519Signature: []
    - HMACSignature: []
      ECDSASignature: []
  identity-signature: &AccountSignature
    - ED25519Signature: []
    - ECDSASignature: []
  session-signature: &SessionSignature
    - ED25519Signature: []
    - ECDSASignature: []

servers:
  - url: https://api.example.com/idb
    description: IDB directory base path

components:
  securitySchemes:

    HMACSignature:
      type: http
      scheme: signature
      description: >
        Signatures are generated according to RFC 9421 via hmac-sha256.
        The signature must be included in the `Signature` and `Signature-Input`
        headers.
      x-signatureAlgorithm: hmac-sha256

    ED25519Signature:
      type: http
      scheme: signature
      description: >
        Signatures are generated according to RFC 9421 via ed25519.
        The signature must be included in the `Signature` and `Signature-Input`
        headers.
      x-signatureAlgorithm: ed25519

    ECDSASignature:
      type: http
      scheme: signature
      description: >
        Signatures are generated according to RFC 9421 via ecdsa-p256-sha256.
        The signature must be included in the `Signature` and `Signature-Input`
        headers.
      x-signatureAlgorithm: ecdsa-p256-sha256

  schemas:
    ProblemDocument:
      type: object
      required: [type]
      additionalProperties: false
      properties:
        type:
          type: string
          enum:
            - about:blank
        detail:
          type: string
        title:
          type: string
        status:
          type: integer

    Directory:
      type: object
      required: [initialize, accept-invitation, login, boundary, tag, role, identity, ssh]
      additionalProperties: false
      properties:
        initialize:
          type: string
        accept-invitation:
          type: string
        login:
          type: string
        boundary:
          type: string
        tag:
          type: string
        role:
          type: string
        identity:
          type: string
        ssh:
          type: string


    ECDSAPublicJWK:
      description: RFC 7517
      type: object
      required: [crv, kty, x, y]
      additionalProperties: false
      properties:
        crv:
          type: string
          enum: [P-256]
        kty:
          type: string
          enum: [EC]
        x:
          type: string
        y:
          type: string

    ED25519PublicJWK:
      description: RFC 8037
      type: object
      required: [crv, kty, x]
      additionalProperties: false
      properties:
        crv:
          type: string
          enum: [Ed25519]
        kty:
          type: string
          enum: [OKP]
        x:
          type: string

    RSAPublicJWK:
      description: RFC 7518
      type: object
      required: [kty, e, n]
      additionalProperties: false
      properties:
        kty:
          type: string
          enum: [RSA]
        e:
          type: string
        n:
          type: string


    PublicJWK:
      description: >
        We currently support only two types because we do not need to support
        more. Patches to support alternatives are welcome :)
      oneOf:
        - $ref: '#/components/schemas/RSAPublicJWK'
        - $ref: '#/components/schemas/ECDSAPublicJWK'
        - $ref: '#/components/schemas/ED25519PublicJWK'

    SymmetricJWK:
      description: A private key represented as a JWK
      type: object
      required: [kty, k]
      additionalProperties: false
      properties:
        kty:
          type: string
          enum: [oct]
        k:
          description: base64url encoded symmetric key bytes
          type: string

    BoundaryGrant:
      type: object
      additionalProperties: false
      required: [type, filter, permission]
      properties:
        type:
          type: string
          enum: ['boundary']
        filter:
          type: object
          additionalProperties: false
          required: [name]
          properties:
            name:
              type: [string, "null"]
        permission:
          type: object
          additionalProperties: false
          required: [create, read, update, delete]
          properties:
            create:
              type: boolean
            read:
              type: boolean
            update:
              type: [object, 'null']
              additionalProperties: false
              required: [name, description, ceiling_list, denied_list]
              properties:
                name:
                  type: boolean
                description:
                  type: boolean
                ceiling_list:
                  type: boolean
                denied_list:
                  type: boolean
            delete:
              type: boolean

    TagGrant:
      type: object
      additionalProperties: false
      required: [type, filter, permission]
      properties:
        type:
          type: string
          enum: ['tag']
        filter:
          type: object
          additionalProperties: false
          required: [name_value]
          properties:
            name_value:
              type: [string, "null"]
        permission:
          type: object
          additionalProperties: false
          required: [create, read, delete]
          properties:
            create:
              type: boolean
            read:
              type: boolean
            delete:
              type: boolean

    RoleGrant:
      type: object
      additionalProperties: false
      required: [type, filter, permission]
      properties:
        type:
          type: string
          enum: ['role']
        filter:
          type: object
          additionalProperties: false
          required: [name]
          properties:
            name:
              type: [string, "null"]
        permission:
          type: object
          additionalProperties: false
          required: [create, read, update, delete]
          properties:
            create:
              type: boolean
            read:
              type: boolean
            update:
              type: [object, 'null']
              additionalProperties: false
              required: [name, description, grant_list, member_list]
              properties:
                name:
                  type: boolean
                description:
                  type: boolean
                grant_list:
                  type: boolean
                member_list:
                  type: boolean
            delete:
              type: boolean

    TripletFilter:
      type: object
      additionalProperties: false
      required: [instance, tag_list, boundary_list]
      properties:
        instance:
          type: [string, "null"]
        tag_list:
          type: [array, "null"]
          items:
            type: string
        boundary_list:
          type: [array, "null"]
          items:
            type: string

    IdentityGrant:
      type: object
      additionalProperties: false
      required: [type, filter, permission]
      properties:
        type:
          type: string
          enum: ['identity']
        filter:
          $ref: '#/components/schemas/TripletFilter'
        permission:
          type: object
          additionalProperties: false
          required: [create, read, update, delete, add_tag_list, del_tag_list, invite_list]
          properties:
            create:
              type: [object, "null"]
              additionalProperties: false
              required: [allowed_tag_list, required_boundary_list]
              properties:
                allowed_tag_list:
                  type: [array, "null"]
                  items:
                    type: string
                required_boundary_list:
                  type: [array, "null"]
                  items:
                    item: string
            read:
              type: boolean
            update:
              type: [object, 'null']
              additionalProperties: false
              required: [name]
              properties:
                name:
                  type: boolean
            delete:
              type: boolean
            add_tag_list:
              type: [array, "null"]
              items:
                type: string
            del_tag_list:
              type: [array, "null"]
              items:
                type: string
            invite_list:
              type: [array, "null"]
              items:
                type: string
                enum: ['email', 'manual']

    SSHGrant:
      type: object
      additionalProperties: false
      required: [type, filter, permission]
      properties:
        type:
          type: string
          enum: ['ssh']
        filter:
          $ref: '#/components/schemas/TripletFilter'
        permission:
          type: object
          additionalProperties: false
          required: [force_command_list, username_list, permit_pty, permit_user_rc, permit_x11_forwarding, permit_agent_forwarding, permit_port_forwarding]
          properties:
            force_command_list:
              type: [array, "null"]
              items:
                type: string
            username_list:
              type: [array, "null"]
              items:
                type: string
            permit_pty:
              type: boolean
            permit_user_rc:
              type: boolean
            permit_x11_forwarding:
              type: boolean
            permit_agent_forwarding:
              type: boolean
            permit_port_forwarding:
              type: boolean

    InvalidGrant:
      type: object
      additionalProperties: false
      required: type
      properties:
        type:
          type: string
          enum: ['invalid']

    Grant:
      oneOf:
        - $ref: '#/components/schemas/InvalidGrant'
        - $ref: '#/components/schemas/BoundaryGrant'
        - $ref: '#/components/schemas/TagGrant'
        - $ref: '#/components/schemas/RoleGrant'
        - $ref: '#/components/schemas/IdentityGrant'
        - $ref: '#/components/schemas/SSHGrant'

    Boundary:
      description: A boundary
      type: object
      required: [id, name, description, ceiling_list, denied_list]
      additionalProperties: false
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        ceiling_list:
          type: [array, "null"]
          items:
            $ref: '#/components/schemas/Grant'
        denied_list:
          type: array
          items:
            $ref: '#/components/schemas/Grant'

    Role:
      description: A role
      type: object
      required: [id, name, description, grant_list, member_list]
      additionalProperties: false
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        grant_list:
          type: array
          items:
            $ref: '#/components/schemas/Grant'
        member_list:
          type: array
          items:
            type: object
            required: [id, name]
            additionalProperties: false
            properties:
              id:
                type: integer
              name:
                type: string

    IdentityTag:
      type: object
      required: [id, name, value]
      additionalProperties: false
      properties:
        id:
          type: integer
        name:
          type: string
        value:
          type: string

    IdentityBoundary:
      type: object
      required: [id, name]
      additionalProperties: false
      properties:
        id:
          type: integer
        name:
          type: string

    Identity:
      description: An identity (a human or a host)
      type: object
      required: [id, name, tags, boundaries]
      additionalProperties: false
      properties:
        id:
          type: integer
        name:
          type: string
        tags:
          type: array
          items:
            $ref: '#/components/schemas/IdentityTag'
        boundaries:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/IdentityBoundary'

    Invitation:
      type: object
      required: [key]
      additionalProperties: false
      properties:
        key:
          $ref: '#/components/schemas/SymmetricJWK'

    AcceptInvitationRequest:
      type: object
      required: [account_public_key, nonce]
      additionalProperties: false
      properties:
        account_public_key:
          $ref: '#/components/schemas/PublicJWK'
        nonce:
          type: string

    LoginRequest:
      type: object
      required: [session_public_key, nonce]
      additionalProperties: false
      properties:
        session_public_key:
          $ref: '#/components/schemas/PublicJWK'
        nonce:
          type: string

    CreateBoundaryRequest:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name:
          type: string
        description:
          type: string

    UpdateBoundaryRequest:
      type: object
      additionalProperties: false
      properties:
        description:
          type: string
        name:
          type: string
        denied_list:
          type: array
          items:
            $ref: '#/components/schemas/Grant'
        ceiling_list:
          type: array
          items:
            $ref: '#/components/schemas/Grant'

    Tag:
      description: A tag
      type: object
      required: [id, name, value]
      additionalProperties: false
      properties:
        id:
          type: integer
        name:
          type: string
        value:
          type: string

    CreateTagRequest:
      type: object
      required: [name, value]
      additionalProperties: false
      properties:
        name:
          type: string
        value:
          type: string

    CreateRoleRequest:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name:
          type: string
        description:
          type: string

    UpdateRoleRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        description:
          type: string
        grant_list:
          type: array
          items:
            $ref: '#/components/schemas/Grant'
        member_list:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              id:
                type: integer
              name:
                type: string

    CreateIdentityRequest:
      type: object
      required: [name, boundaries]
      additionalProperties: false
      properties:
        name:
          type: string
        boundaries:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              id:
                type: integer
              name:
                type: string
        tags:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/IdentityTagId'
              - $ref: '#/components/schemas/IdentityTagNameValue'

    IdentityTagId:
      type: object
      additionalProperties: false
      required: [id]
      properties:
        id:
          type: integer

    IdentityTagNameValue:
      type: object
      additionalProperties: false
      required: [name, value]
      properties:
        name:
          type: string
        value:
          type: string

    UpdateIdentityTagOperation:
      description: Operations are processed in order server-side
      type: object
      properties:
        type:
          type: string
          enum: [set, add, del]
        values:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/IdentityTagId'
              - $ref: '#/components/schemas/IdentityTagNameValue'

    UpdateIdentityRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        tags:
          type: array
          items:
            $ref: '#/components/schemas/UpdateIdentityTagOperation'

    SshUserCertificateRequest:
      type: object
      required: [hostname, username, public_key]
      additionalProperties: false
      properties:
        hostname:
          type: string
        username:
          type: string
        public_key:
          $ref: '#/components/schemas/PublicJWK'

    SshHostCertificateRequest:
      type: object
      required: [public_keys]
      additionalProperties: false
      properties:
        public_keys:
          type: array
          items:
            $ref: '#/components/schemas/PublicJWK'

  responses:
    ErrorResponse:
      description: Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDocument'

    InitializeResponse:
      description: First identity created
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Invitation'

    BoundaryListResponse:
      description: OK
      content:
        application/json:
          schema:
            type: object
            required: [boundaries]
            additionalProperties: false
            properties:
              boundaries:
                type: array
                items:
                  $ref: '#/components/schemas/Boundary'

    BoundaryResponse:
      description: OK
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Boundary'

    TagListResponse:
      description: OK
      content:
        application/json:
          schema:
            type: object
            required: [tags]
            additionalProperties: false
            properties:
              tags:
                type: array
                items:
                  $ref: '#/components/schemas/Tag'

    TagResponse:
      description: OK
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Tag'

    RoleListResponse:
      description: OK
      content:
        application/json:
          schema:
            type: object
            required: [roles]
            additionalProperties: false
            properties:
              roles:
                type: array
                items:
                  $ref: '#/components/schemas/Role'

    RoleResponse:
      description: OK
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Role'

    IdentityListResponse:
      description: OK
      content:
        application/json:
          schema:
            type: object
            required: [identities]
            additionalProperties: false
            properties:
              identities:
                type: array
                items:
                  $ref: '#/components/schemas/Identity'

    IdentityResponse:
      description: OK
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Identity'

    InvitationResponse:
      description: OK
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Invitation'

    AcceptInvitationResponse:
      description: Invitation accepted
      content:
        application/json:
          schema:
            type: object

    SshCertificateResponse:
      description: OK
      content:
        application/json:
          schema:
            type: object
            required: [certificates]
            properties:
              certificates:
                type: array
                items:
                  type: string
                  format: base64

    SshTrustedKeysResponse:
      description: OK
      content:
        text/plain:
          schema:
            description: one public key per line, OpenSSH format
            type: string

paths:
  /idb/directory:
    get:
      summary: Directory
      description: The IDB directory
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Directory"

  /idb/initialize:
    post:
      summary: Initialize
      description: Setup the application after first startup
      responses:
        "204":
          description: Allready created
        "200":
          $ref: '#/components/responses/InitializeResponse'

  /idb/accept-invitation:
    post:
      security: *InvitationSignature
      summary: Accept invitation
      description: Bind a local account key with the invitation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptInvitationRequest'
      responses:
        "204":
          description: Invitation accepted
        default:
          $ref: '#/components/responses/ErrorResponse'

  /idb/login:
    post:
      security: *AccountSignature
      summary: Login
      description: >
        Bind a local session key with the identity associated with
        the account
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        "204":
          description: Login OK
        default:
          $ref: '#/components/responses/ErrorResponse'

  /idb/boundary:
    get:
      security: *SessionSignature
      summary: List Boundaries
      description: >
        Return the list of boundaries the user is allowed to see
      parameters:
        - in: query
          name: name
          schema:
            type: string
          required: false
          description: If specified, return boundaries that match this name
        - in: query
          name: id
          schema:
            type: string
          required: false
          description: If specified, return boundaries that match this id
      responses:
        "200":
          $ref: "#/components/responses/BoundaryListResponse"
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      security: *SessionSignature
      summary: Create boundary
      description: >
        Create a new boundary
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBoundaryRequest'
      responses:
        "201":
          $ref: "#/components/responses/BoundaryResponse"
        default:
          $ref: '#/components/responses/ErrorResponse'


  /idb/boundary/{boundary_id}:
    parameters:
      - in: path
        name: boundary_id
        schema:
          type: integer
        required: true
        description: The unique identifier of the boundary requested
    patch:
      security: *SessionSignature
      summary: Update boundary
      description: >
        Update boundary parameters
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBoundaryRequest'
      responses:
        "200":
          $ref: "#/components/responses/BoundaryResponse"
        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
      security: *SessionSignature
      summary: Delete one boundary
      responses:
        "204":
          description: Delete OK
        default:
          $ref: '#/components/responses/ErrorResponse'

  /idb/tag:
    get:
      security: *SessionSignature
      summary: List Tags
      description: >
        Return the list of tags the user is allowed to see
      parameters:
        - in: query
          name: value
          schema:
            type: string
          required: false
          description: If specified, return tags that match this value
        - in: query
          name: name
          schema:
            type: string
          required: false
          description: If specified, return tags that match this name
        - in: query
          name: id
          schema:
            type: string
          required: false
          description: If specified, return tags that match this id
      responses:
        "200":
          $ref: "#/components/responses/TagListResponse"
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      security: *SessionSignature
      summary: Create Tag
      description: >
        Create a new Tag
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTagRequest'
      responses:
        "201":
          $ref: "#/components/responses/TagResponse"
        default:
          $ref: '#/components/responses/ErrorResponse'

  /idb/tag/{tag_id}:
    parameters:
      - in: path
        name: tag_id
        schema:
          type: integer
        required: true
        description: The unique identifier of the tag targeted
    delete:
      security: *SessionSignature
      summary: Delete one tag
      responses:
        "204":
          description: Delete OK
        default:
          $ref: '#/components/responses/ErrorResponse'

  /idb/role:
    get:
      security: *SessionSignature
      summary: List Roles
      description: >
        Return the list of roles the user is allowed to see
      parameters:
        - in: query
          name: name
          schema:
            type: string
          required: false
          description: If specified, return roles that match this name
        - in: query
          name: id
          schema:
            type: string
          required: false
          description: If specified, return roles that match this id
      responses:
        "200":
          $ref: "#/components/responses/RoleListResponse"
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      security: *SessionSignature
      summary: Create role
      description: >
        Create a new role
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleRequest'
      responses:
        "201":
          $ref: "#/components/responses/RoleResponse"
        default:
          $ref: '#/components/responses/ErrorResponse'


  /idb/role/{role_id}:
    parameters:
      - in: path
        name: role_id
        schema:
          type: integer
        required: true
        description: The unique identifier of the role requested
    patch:
      security: *SessionSignature
      summary: Update role
      description: >
        Update role parameters
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
      responses:
        "200":
          $ref: "#/components/responses/RoleResponse"
        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
      security: *SessionSignature
      summary: Delete one role
      responses:
        "204":
          description: Delete OK
        default:
          $ref: '#/components/responses/ErrorResponse'

  /idb/identity:
    get:
      security: *SessionSignature
      summary: List identities
      description: >
        Return the list of identities the user is allowed to see
      parameters:
        - in: query
          name: name
          schema:
            type: string
          required: false
          description: If specified, return identities that match this name
        - in: query
          name: id
          schema:
            type: integer
          required: false
          description: If specified, return identities that match this id
        - in: query
          name: tag_id
          schema:
            type: integer
          required: false
          description: If specified, return identities that are tagged with this id
        - in: query
          name: tag_name
          schema:
            type: string
          required: false
          description: If specified, return identities that are tagged with this name
        - in: query
          name: boundary_id
          schema:
            type: integer
          required: false
          description: If specified, return identities to which this boundary id applies
        - in: query
          name: boundary_name
          schema:
            type: string
          required: false
          description: If specified, return identities to which this boundary name applies
      responses:
        "200":
          $ref: "#/components/responses/IdentityListResponse"
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      security: *SessionSignature
      summary: Create identity
      description: >
        Create a new identity
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIdentityRequest'
      responses:
        "201":
          $ref: "#/components/responses/IdentityResponse"
        default:
          $ref: '#/components/responses/ErrorResponse'


  /idb/identity/{identity_id}/invite:
    parameters:
      - in: path
