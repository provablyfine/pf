openapi: 3.1.0
info:
  title: IDB API implementation
  description: IDB API to control users and hosts
  version: '1.0'

x-bundles:
  invitation-signature: &InvitationSignature
    - HMACSignature: []
      ED25519Signature: []
    - HMACSignature: []
      ECDSASignature: []
  identity-signature: &AccountSignature
    - ED25519Signature: []
    - ECDSASignature: []
  session-signature: &SessionSignature
    - ED25519Signature: []
    - ECDSASignature: []

servers:
  - url: https://api.example.com/idb
    description: IDB directory base path

components:
  securitySchemes:

    HMACSignature:
      type: http
      scheme: signature
      description: >
        Signatures are generated according to RFC 9421 via hmac-sha256.
        The signature must be included in the `Signature` and `Signature-Input`
        headers.
      x-signatureAlgorithm: hmac-sha256

    ED25519Signature:
      type: http
      scheme: signature
      description: >
        Signatures are generated according to RFC 9421 via ed25519.
        The signature must be included in the `Signature` and `Signature-Input`
        headers.
      x-signatureAlgorithm: ed25519

    ECDSASignature:
      type: http
      scheme: signature
      description: >
        Signatures are generated according to RFC 9421 via ecdsa-p256-sha256.
        The signature must be included in the `Signature` and `Signature-Input`
        headers.
      x-signatureAlgorithm: ecdsa-p256-sha256

  schemas:
    ProblemDocument:
      type: object
      required: [type]
      additionalProperties: false
      properties:
        type:
          type: string
          enum:
            - about:blank
        detail:
          type: string
        title:
          type: string
        status:
          type: integer

    Directory:
      type: object
      required: [initialize]
      additionalProperties: false
      properties:
        initialize:
          type: string
        accept-invitation:
          type: string
        login:
          type: string
        boundary:
          type: string
        tag:
          type: string
        role:
          type: string
        identity:
          type: string


    ECDSAPublicJWK:
      description: RFC 7517
      type: object
      required: [crv, kty, x, y]
      additionalProperties: false
      properties:
        crv:
          type: string
          enum: [P-256]
        kty:
          type: string
          enum: [EC]
        x:
          type: string
        y:
          type: string

    ED25519PublicJWK:
      description: RFC 8037
      type: object
      required: [crv, kty, x]
      additionalProperties: false
      properties:
        crv:
          type: string
          enum: [Ed25519]
        kty:
          type: string
          enum: [OKP]
        x:
          type: string

    PublicJWK:
      description: >
        We currently support only two types because we do not need to support
        more. Patches to suport alternatives are welcome :)
      oneOf:
        - $ref: '#/components/schemas/ECDSAPublicJWK'
        - $ref: '#/components/schemas/ED25519PublicJWK'

    SymmetricJWK:
      description: A private key represented as a JWK
      type: object
      required: [kty, k]
      additionalProperties: false
      properties:
        kty:
          type: string
          enum: [oct]
        k:
          description: base64url encoded symmetric key bytes
          type: string

    PermissionObjectFieldsWithName:
      type: array
      maxItems: 1
      items:
        type: object
        required: [name, value]
        additionalProperties: false
        properties:
          name:
            type: string
            enum: ['name']
          value:
            type: string

    PermissionObjectFieldsWithNameAndTagAndCreatedBy:
      type: array
      items:
        type: object
        required: [name, value]
        additionalProperties: false
        properties:
          name:
            type: string
            enum: ['name', 'tag', 'created_by']
          value:
            type: string


    EmptyList:
      type: array
      maxItems: 0
      items:
        type: "null"

    CRDAction:
      type: object
      required: [action, action_fields]
      properties:
        action:
          type: string
          enum: ['*', 'create', 'read', 'delete']
        action_fields:
          $ref: '#/components/schemas/EmptyList'

    BoundaryUpdateAction:
      type: object
      required: [action, action_fields]
      properties:
        action:
          type: string
          enum: ['update']
        action_fields:
          type: array
          items:
            type: object
            required: [name, value]
            additionalProperties: false
            properties:
              name:
                type: string
                enum: ['field']
              value:
                type: string
                enum: ['name', 'description', 'denied_list', 'ceiling_list']

    BoundaryPermission:
      unevaluatedProperties: false
      anyOf:
        - type: object
          required: [object, object_fields]
          properties:
            object:
              type: string
              enum: ['boundary']
            object_fields:
              $ref: '#/components/schemas/PermissionObjectFieldsWithName'
        - oneOf:
            - $ref: '#/components/schemas/CRDAction'
            - $ref: '#/components/schemas/BoundaryUpdateAction'

    TagPermission:
      unevaluatedProperties: false
      anyOf:
        - type: object
          required: [object, object_fields]
          properties:
            object:
              type: string
              enum: ['tag']
            object_fields:
              $ref: '#/components/schemas/PermissionObjectFieldsWithName'
        - oneOf:
            - $ref: '#/components/schemas/CRDAction'

    RoleUpdateAction:
      type: object
      required: [action, action_fields]
      properties:
        action:
          type: string
          enum: ['update']
        action_fields:
          type: array
          items:
            type: object
            required: [name, value]
            additionalProperties: false
            properties:
              name:
                type: string
                enum: ['field']
              value:
                type: string
                enum: ['name', 'description', 'member_list', 'permission_list']

    RolePermission:
      unevaluatedProperties: false
      anyOf:
        - type: object
          required: [object, object_fields]
          properties:
            object:
              type: string
              enum: ['role']
            object_fields:
              $ref: '#/components/schemas/PermissionObjectFieldsWithName'
        - oneOf:
            - $ref: '#/components/schemas/CRDAction'
            - $ref: '#/components/schemas/RoleUpdateAction'

    IdentityTagAction:
      type: object
      required: [action, action_fields]
      properties:
        action:
          type: string
          enum: ['add-tag', 'del-tag']
        action_fields:
          type: array
          items:
            type: object
            required: [name, value]
            additionalProperties: false
            properties:
              name:
                type: string
                enum: ['tag']
              value:
                type: string

    IdentitySshShellAction:
      type: object
      required: [action, action_fields]
      properties:
        action:
          type: string
          enum: ['ssh-shell']
        action_fields:
          type: array
          maxItems: 1
          items:
            type: object
            required: [name, value]
            additionalProperties: false
            properties:
              name:
                type: string
                enum: ['username']
              value:
                type: string

    IdentitySshExecAction:
      type: object
      required: [action, action_fields]
      properties:
        action:
          type: string
          enum: ['ssh-exec']
        action_fields:
          type: array
          maxItems: 2
          items:
            type: object
            required: [name, value]
            additionalProperties: false
            properties:
              name:
                type: string
                enum: ['username', 'command']
              value:
                type: string

    IdentitySshForwardAction:
      type: object
      required: [action, action_fields]
      properties:
        action:
          type: string
          enum: ['ssh-forward-local', 'ssh-forward-remote']
        action_fields:
          type: array
          maxItems: 2
          items:
            type: object
            required: [name, value]
            additionalProperties: false
            properties:
              name:
                type: string
                enum: ['username', 'rport']
              value:
                type: string

    IdentityPermission:
      unevaluatedProperties: false
      anyOf:
        - type: object
          required: [object, object_fields]
          properties:
            object:
              type: string
              enum: ['identity']
            object_fields:
              $ref: '#/components/schemas/PermissionObjectFieldsWithNameAndTagAndCreatedBy'
        - oneOf:
            - $ref: '#/components/schemas/CRDAction'
            - $ref: '#/components/schemas/IdentityTagAction'
            - $ref: '#/components/schemas/IdentitySshShellAction'
            - $ref: '#/components/schemas/IdentitySshExecAction'
            - $ref: '#/components/schemas/IdentitySshForwardAction'

    Permission:
      oneOf:
        - $ref: '#/components/schemas/BoundaryPermission'
        - $ref: '#/components/schemas/TagPermission'
        - $ref: '#/components/schemas/RolePermission'
        - $ref: '#/components/schemas/IdentityPermission'

    Boundary:
      description: A boundary
      type: object
      required: [id, name, description, ceiling_list, denied_list]
      additionalProperties: false
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        ceiling_list:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        denied_list:
          type: array
          items:
            $ref: '#/components/schemas/Permission'

    Role:
      description: A role
      type: object
      required: [id, name, description, permission_list, member_list]
      additionalProperties: false
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        permission_list:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        member_list:
          type: array
          items:
            type: object
            required: [id, name]
            additionalProperties: false
            properties:
              id:
                type: integer
              name:
                type: string

    IdentityTag:
      type: object
      required: [id, name, value]
      additionalProperties: false
      properties:
        id:
          type: integer
        name:
          type: string
        value:
          type: string

    IdentityBoundary:
      type: object
      required: [id, name]
      additionalProperties: false
      properties:
        id:
          type: integer
        name:
          type: string

    Identity:
      description: An identity (a human or a host)
      type: object
      required: [id, name, tags, boundaries]
      additionalProperties: false
      properties:
        id:
          type: integer
        name:
          type: string
        tags:
          type: array
          items:
            $ref: '#/components/schemas/IdentityTag'
        boundaries:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/IdentityBoundary'

    AcceptInvitationRequest:
      type: object
      required: [account_public_key, nonce]
      additionalProperties: false
      properties:
        account_public_key:
          $ref: '#/components/schemas/PublicJWK'
        nonce:
          type: string

    LoginRequest:
      type: object
      required: [session_public_key, nonce]
      additionalProperties: false
      properties:
        session_public_key:
          $ref: '#/components/schemas/PublicJWK'
        nonce:
          type: string

    CreateBoundaryRequest:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name:
          type: string
        description:
          type: string

    UpdateBoundaryRequest:
      type: object
      additionalProperties: false
      properties:
        description:
          type: string
        name:
          type: string
        denied_list:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        ceiling_list:
          type: array
          items:
            $ref: '#/components/schemas/Permission'

    Tag:
      description: A tag
      type: object
      required: [id, name, value]
      additionalProperties: false
      properties:
        id:
          type: integer
        name:
          type: string
        value:
          type: string

    CreateTagRequest:
      type: object
      required: [name, value]
      additionalProperties: false
      properties:
        name:
          type: string
        value:
          type: string

    CreateRoleRequest:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name:
          type: string
        description:
          type: string

    UpdateRoleRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        description:
          type: string
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        members:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              id:
                type: integer
              name:
                type: string

    CreateIdentityRequest:
      type: object
      required: [name, boundaries]
      additionalProperties: false
      properties:
        name:
          type: string
        boundaries:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              id:
                type: integer
              name:
                type: string

    UpdateIdentityRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        tags:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              id:
                type: integer
              name:
                type: string
              value:
                type: string

  responses:
    ErrorResponse:
      description: Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDocument'

    InitializeResponse:
      description: First identity created
      content:
        application/json:
          schema:
            type: object
            required: [key]
            additionalProperties: false
            properties:
              key:
                $ref: '#/components/schemas/SymmetricJWK'

    BoundaryListResponse:
      description: OK
      content:
        application/json:
          schema:
            type: object
            required: [boundaries]
            additionalProperties: false
            properties:
              boundaries:
                type: array
                items:
                  $ref: '#/components/schemas/Boundary'

    BoundaryResponse:
      description: OK
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Boundary'

    TagListResponse:
      description: OK
      content:
        application/json:
          schema:
            type: object
            required: [tags]
            additionalProperties: false
            properties:
              tags:
                type: array
                items:
                  $ref: '#/components/schemas/Tag'

    TagResponse:
      description: OK
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Tag'

    RoleListResponse:
      description: OK
      content:
        application/json:
          schema:
            type: object
            required: [roles]
            additionalProperties: false
            properties:
              roles:
                type: array
                items:
                  $ref: '#/components/schemas/Role'

    RoleResponse:
      description: OK
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Role'

    IdentityListResponse:
      description: OK
      content:
        application/json:
          schema:
            type: object
            required: [identities]
            additionalProperties: false
            properties:
              identities:
                type: array
                items:
                  $ref: '#/components/schemas/Identity'

    IdentityResponse:
      description: OK
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Identity'

    AcceptInvitationResponse:
      description: Invitation accepted
      content:
        application/json:
          schema:
            type: object

paths:
  /idb/directory:
    get:
      summary: Directory
      description: The IDB directory
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Directory"

  /idb/initialize:
    post:
      summary: Initialize
      description: Setup the application after first startup
      responses:
        "204":
          description: Allready created
        "200":
          $ref: '#/components/responses/InitializeResponse'

  /idb/accept-invitation:
    post:
      security: *InvitationSignature
      summary: Accept invitation
      description: Bind a local account key with the invitation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptInvitationRequest'
      responses:
        "204":
          description: Invitation accepted
        default:
          $ref: '#/components/responses/ErrorResponse'

  /idb/login:
    post:
      security: *AccountSignature
      summary: Login
      description: >
        Bind a local session key with the identity associated with
        the account
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        "204":
          description: Login OK
        default:
          $ref: '#/components/responses/ErrorResponse'

  /idb/boundary:
    get:
      security: *SessionSignature
      summary: List Boundaries
      description: >
        Return the list of boundaries the user is allowed to see
      parameters:
        - in: query
          name: name
          schema:
            type: string
          required: false
          description: If specified, return boundaries that match this name
        - in: query
          name: id
          schema:
            type: string
          required: false
          description: If specified, return boundaries that match this id
      responses:
        "200":
          $ref: "#/components/responses/BoundaryListResponse"
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      security: *SessionSignature
      summary: Create boundary
      description: >
        Create a new boundary
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBoundaryRequest'
      responses:
        "201":
          $ref: "#/components/responses/BoundaryResponse"
        default:
          $ref: '#/components/responses/ErrorResponse'


  /idb/boundary/{boundary_id}:
    parameters:
      - in: path
        name: boundary_id
        schema:
          type: integer
        required: true
        description: The unique identifier of the boundary requested
    patch:
      security: *SessionSignature
      summary: Update boundary
      description: >
        Update boundary parameters
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBoundaryRequest'
      responses:
        "200":
          $ref: "#/components/responses/BoundaryResponse"
        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
      security: *SessionSignature
      summary: Delete one boundary
      responses:
        "204":
          description: Delete OK
        default:
          $ref: '#/components/responses/ErrorResponse'

  /idb/tag:
    get:
      security: *SessionSignature
      summary: List Tags
      description: >
        Return the list of tags the user is allowed to see
      parameters:
        - in: query
          name: value
          schema:
            type: string
          required: false
          description: If specified, return tags that match this value
        - in: query
          name: name
          schema:
            type: string
          required: false
          description: If specified, return tags that match this name
        - in: query
          name: id
          schema:
            type: string
          required: false
          description: If specified, return tags that match this id
      responses:
        "200":
          $ref: "#/components/responses/TagListResponse"
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      security: *SessionSignature
      summary: Create Tag
      description: >
        Create a new Tag
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTagRequest'
      responses:
        "201":
          $ref: "#/components/responses/TagResponse"
        default:
          $ref: '#/components/responses/ErrorResponse'

  /idb/tag/{tag_id}:
    parameters:
      - in: path
        name: tag_id
        schema:
          type: integer
        required: true
        description: The unique identifier of the tag targeted
    delete:
      security: *SessionSignature
      summary: Delete one tag
      responses:
        "204":
          description: Delete OK
        default:
          $ref: '#/components/responses/ErrorResponse'

  /idb/role:
    get:
      security: *SessionSignature
      summary: List Roles
      description: >
        Return the list of roles the user is allowed to see
      parameters:
        - in: query
          name: name
          schema:
            type: string
          required: false
          description: If specified, return roles that match this name
        - in: query
          name: id
          schema:
            type: string
          required: false
          description: If specified, return roles that match this id
      responses:
        "200":
          $ref: "#/components/responses/RoleListResponse"
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      security: *SessionSignature
      summary: Create role
      description: >
        Create a new role
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleRequest'
      responses:
        "201":
          $ref: "#/components/responses/RoleResponse"
        default:
          $ref: '#/components/responses/ErrorResponse'


  /idb/role/{role_id}:
    parameters:
      - in: path
        name: role_id
        schema:
          type: integer
        required: true
        description: The unique identifier of the role requested
    patch:
      security: *SessionSignature
      summary: Update role
      description: >
        Update role parameters
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
      responses:
        "200":
          $ref: "#/components/responses/RoleResponse"
        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
      security: *SessionSignature
      summary: Delete one role
      responses:
        "204":
          description: Delete OK
        default:
          $ref: '#/components/responses/ErrorResponse'

  /idb/identity:
    get:
      security: *SessionSignature
      summary: List identities
      description: >
        Return the list of identities the user is allowed to see
      parameters:
        - in: query
          name: name
          schema:
            type: string
          required: false
          description: If specified, return identities that match this name
        - in: query
          name: id
          schema:
            type: integer
          required: false
          description: If specified, return identities that match this id
        - in: query
          name: tag_id
          schema:
            type: integer
          required: false
          description: If specified, return identities that are tagged with this id
        - in: query
          name: tag_name
          schema:
            type: string
          required: false
          description: If specified, return identities that are tagged with this name
        - in: query
          name: boundary_id
          schema:
            type: integer
          required: false
          description: If specified, return identities to which this boundary id applies
        - in: query
          name: boundary_name
          schema:
            type: string
          required: false
          description: If specified, return identities to which this boundary name applies
      responses:
        "200":
          $ref: "#/components/responses/IdentityListResponse"
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      security: *SessionSignature
      summary: Create identity
      description: >
        Create a new identity
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIdentityRequest'
      responses:
        "201":
          $ref: "#/components/responses/IdentityResponse"
        default:
          $ref: '#/components/responses/ErrorResponse'


  /idb/identity/{identity_id}:
    parameters:
      - in: path
        name: identity_id
        schema:
          type: integer
        required: true
        description: The unique identifier of the identity requested
    patch:
      security: *SessionSignature
      summary: Update identity
      description: >
        Update identity parameters
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateIdentityRequest'
      responses:
        "200":
          $ref: "#/components/responses/IdentityResponse"
        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
      security: *SessionSignature
      summary: Delete one identity
      responses:
        "204":
          description: Delete OK
        default:
          $ref: '#/components/responses/ErrorResponse'
