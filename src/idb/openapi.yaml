openapi: 3.1.0
info:
  title: ADMIN API implementation
  description: ADMIN API to control users and hosts
  version: '1.0'

servers:
  - url: https://api.example.com/admin
    description: ADMIN directory base path

components:
  schemas:
    ProblemDocument:
      type: object
      required: [type]
      additionalProperties: false
      properties:
        type:
          type: string
          enum:
            - about:blank
        detail:
          type: string
        title:
          type: string
        status:
          type: integer

    Directory:
      type: object
      required: [initialize]
      additionalProperties: false
      properties:
        initialize:
          type: string

  responses:
    ErrorResponse:
      description: Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDocument'


paths:
  /admin/directory:
    get:
      summary: Directory
      description: The ADMIN directory
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Directory"
