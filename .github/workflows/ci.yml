name: CI

on:
  push:
    branches:
      - main
      - mathieu
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - name: Run pyright
        run: uv run pyright
      - name: Run ruff check
        run: uv run ruff check
      - name: Run ruff format
        run: uv run ruff format --check
      - name: Check imports
        run: ./scripts/check-imports
      - name: Check license compatibility
        run: uv run licensecheck

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install podman
        run: sudo apt-get update && sudo apt-get install -y podman openssh-client
      - name: Run tests
        run: uv run pytest --basetemp=/tmp/pf-test-logs
      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.python-version }}
          path: /tmp/pf-test-logs/
